pipeline:
  name: "AI Research Digest"
  description: "Daily AI research paper digest from ArXiv"

sources:
  - type: "arxiv_source"
    config:
      categories:
        - "cs.LG"
        - "cs.CV"
        - "cs.CL"
        - "cs.MA"
        - "cs.IR"
        - "eess.AS"
      days: 14
      max_per_day: 250
      cache_dir: "cache"

processors:
  - type: "semantic_scholar_ranker"
    config:
      batch_size: 500
      cache_dir: "cache"
  
  - type: "filter"
    config:
      top_n: 14
      min_score: 0.0

generators:
  - type: "markdown_generator"
    config:
      template: "research_paper"
      template_path: "templates/research_paper.yaml"
      model_provider: "ollama"
      model_config:
        model_name: "mistral"
      output_dir: "papers"
      max_retries: 3

publishers:
  - type: "file_publisher"
    config:
      output_dir: "output"
      formats:
        - "md"
        - "html"
